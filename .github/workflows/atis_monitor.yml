name: Proactive ATIS Monitor

on:
  schedule:
    # Runs at 2 and 32 mins past the hour (dodging the :00 and :30 GitHub traffic)
    # Covers 6:02 AM to 11:32 PM MST 
    - cron: '2,32 13-23,0-6 * * *'
  workflow_dispatch:

concurrency:
  group: atis-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install ffmpeg -y
          pip install google-genai requests

      - name: Run Monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: python atis_master.py

      - name: Commit State
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f last_atis_letter.txt ]; then
            git add last_atis_letter.txt
            git commit -m "Update ATIS state" || exit 0
            git push
          else
            echo "State file not found. Skipping commit."
          fi
